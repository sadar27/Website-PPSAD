<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Formulir Pendaftaran Santri Baru</title>

<style>
body {
  font-family: 'Gill Sans', sans-serif;
  background-color: #c6dffd;
}

/* Container */
.container {
  width: 420px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Judul */
h2 {
  text-align: center;
  color: #1e63c6;
}

/* Label */
label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
  color: #333;
}

/* Input */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

/* Efek saat diklik */
input:focus, select:focus, textarea:focus {
  border-color: #1e63c6;
  box-shadow: 0 0 5px rgba(30,99,198,0.3);
}

/* Tombol  */
.btn-daftar {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background-color: #1e63c6;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 50px; /* bentuk oval */
  cursor: pointer;
  transition: 0.3s;
}

.btn-daftar:hover {
  background-color: #174ea6;
}
</style>

</head>
<body>

<div class="container" id="form-daftar">
  <h2>Formulir Pendaftaran</h2>

 <form id="formSantri">

  <input type="text" id="nama" placeholder="Nama Lengkap" required>

  <input type="text" id="nisn" placeholder="NISN" required>

  <input type="text" id="kk" placeholder="No KK" required>

  <input type="text" id="nik" placeholder="No NIK" required>

  <input type="text" id="tempat_lahir" placeholder="Tempat Lahir" required>

  <input type="date" id="tanggal_lahir" required>

  <select id="jenis_kelamin" required>
    <option value="">-- Pilih --</option>
    <option value="Putra">Putra</option>
    <option value="Putri">Putri</option>
  </select>

  <textarea id="alamat" placeholder="Alamat" required></textarea>

  <button type="submit">Daftar Sekarang</button>

</form>
<script>
const form = document.getElementById("formSantri");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  // AMBIL DATA (PASTIKAN ID SAMA DENGAN HTML)
  const data = {
    nama: document.getElementById("nama").value,
    nisn: document.getElementById("nisn").value,
    kk: document.getElementById("kk").value,
    nik: document.getElementById("nik").value,
    tempat_lahir: document.getElementById("tempat_lahir").value,
    tanggal_lahir: document.getElementById("tanggal_lahir").value,
    jenis_kelamin: document.getElementById("jenis_kelamin").value,
    alamat: document.getElementById("alamat").value
  };

  console.log("DATA:", data); // debug

  fetch("https://script.google.com/macros/s/AKfycbxi7RhpXGhBO5UHYBzNAHTVii-XFP0rplCnDl_DL3mlsYVomm2oOHfz8E6eXy4TooKO/exec", {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(res => res.text())
  .then(res => {
    alert("Pendaftaran berhasil!");
    form.reset();
  })
  .catch(err => {
    alert("Gagal mengirim!");
    console.error(err);
  });

});
</script>
</body>
</html>
