<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Formulir Pendaftaran Santri Baru</title>

<style>
body {
  font-family: 'Gill Sans', sans-serif;
  background-color: #c6dffd;
}

/* Container */
.container {
  width: 420px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Judul */
h2 {
  text-align: center;
  color: #1e63c6;
}

/* Label */
label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
  color: #333;
}

/* Input */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

/* Efek saat diklik */
input:focus, select:focus, textarea:focus {
  border-color: #1e63c6;
  box-shadow: 0 0 5px rgba(30,99,198,0.3);
}

/* Tombol  */
.btn-daftar {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background-color: #1e63c6;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 50px; /* bentuk oval */
  cursor: pointer;
  transition: 0.3s;
}

.btn-daftar:hover {
  background-color: #174ea6;
}
</style>

</head>
<body>

<div class="container" id="form-daftar">
  <h2>Formulir Pendaftaran</h2>

 <form id="formSantri">

  <input type="text" id="nama" name="nama" placeholder="Nama Lengkap" required>

  <input type="text" id="nisn" name="nisn" placeholder="NISN" required>

  <input type="text" id="kk" name="kk" placeholder="No KK" required>

  <input type="text" id="nik" name="nik" placeholder="No NIK" required>

  <input type="text" id="tempat_lahir" name="tempat_lahir" placeholder="Tempat Lahir" required>

  <input type="date" id="tanggal_lahir" name="tanggal_lahir" required>

  <select id="jenis_kelamin" name="jenis_kelamin" required>
    <option value="">-- Pilih --</option>
    <option value="Putra">Putra</option>
    <option value="Putri">Putri</option>
  </select>

  <textarea id="alamat" name="alamat" placeholder="Alamat" required></textarea>

  <button type="submit">Daftar Sekarang</button>

</form>
<script>
const form = document.getElementById("formSantri");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbxi7RhpXGhBO5UHYBzNAHTVii-XFP0rplCnDl_DL3mlsYVomm2oOHfz8E6eXy4TooKO/exec", {
    method: "POST",
    mode: "no-cors", // 🔥 FIX CORS
    body: formData
  })
  .then(() => {
    alert("Pendaftaran berhasil!");
    form.reset();
  })
  .catch(() => {
    alert("Gagal mengirim!");
  });
});
</script>
</body>
</html>
