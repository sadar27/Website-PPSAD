<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pendaftaran Santri Baru</title>

<style>
body {
  font-family: Arial;
  background: #cfe2ff;
}

.container {
  width: 400px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
<h2>Pendaftaran Santri</h2>

<form id="form">
<input type="text" id="nama" placeholder="Nama Lengkap" required>
<input type="number" id="nisn" placeholder="NISN" required>
<input type="number" id="kk" placeholder="No KK" required>
<input type="number" id="nik" placeholder="NIK" required>

<input type="text" id="tempat_lahir" placeholder="Tempat Lahir" required>
<input type="date" id="tanggal_lahir" required>

<select id="jk">
  <option value="Putra">Putra</option>
  <option value="Putri">Putri</option>
</select>

<textarea id="alamat" placeholder="Alamat"></textarea>

<button type="submit">Daftar</button>
</form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxCN7dGgJDGOmRozLXoD0AY6P0nYsvjYjQ-GXWoF2MWPdYP9r9UMeOTC6QFenbLsVtZ4A/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    nama: document.getElementById("nama").value,
    nisn: document.getElementById("nisn").value,
    kk: document.getElementById("kk").value,
    nik: document.getElementById("nik").value,
    tempat_lahir: document.getElementById("tempat_lahir").value,
    tanggal_lahir: document.getElementById("tanggal_lahir").value,
    jenis_kelamin: document.getElementById("jk").value,
    alamat: document.getElementById("alamat").value
  };

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors", // 🔥 INI KUNCINYA
    body: JSON.stringify(data)
  });

  alert("Data berhasil dikirim!");
});
</script>

</body>
</html>
